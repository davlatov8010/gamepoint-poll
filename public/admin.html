<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>GAMEPOINT ADMIN</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 95%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin-right: 10px; }
        .btn-start { background: #28a745; color: white; }
        .btn-pause { background: #ffc107; color: black; }
        .btn-restart { background: #dc3545; color: white; }
        .btn-save { background: #00d2ff; width: 100%; margin-top: 10px; color: black; font-size: 1.1em; }
        .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>
    <h2>| GAMEPOINT BOSHQURUV PANELI</h2>

    <div class="box">
        <label>YouTube Video ID</label>
        <input type="text" id="videoId" placeholder="Masalan: WL8nDidiqHw">
        <div style="margin-top: 10px;">
            <button class="btn-start" onclick="sendControl('start')">START</button>
            <button class="btn-pause" onclick="sendControl('pause')">PAUSE</button>
            <button class="btn-restart" onclick="sendControl('restart')">RESTART (0%)</button>
        </div>
    </div>

    <div class="team-grid">
        <div class="box" style="border-top: 4px solid #00d2ff;">
            <h3>Jamoa A (Chap)</h3>
            <label>Nomi</label><input type="text" id="teamAName">
            <label>Logo yuklash</label><input type="file" id="logoA">
            <label>Ovoz berish kaliti</label><input type="text" id="keyA">
            <button onclick="manualVote('A')">+1 Qo'lda Ovoz</button>
        </div>
        <div class="box" style="border-top: 4px solid #e100e4;">
            <h3>Jamoa B (O'ng)</h3>
            <label>Nomi</label><input type="text" id="teamBName">
            <label>Logo yuklash</label><input type="file" id="logoB">
            <label>Ovoz berish kaliti</label><input type="text" id="keyB">
            <button onclick="manualVote('B')">+1 Qo'lda Ovoz</button>
        </div>
    </div>

    <button class="btn-save" onclick="saveAll()">SOZLAMALARNI SAQLASH (SAVE)</button>

    <script>
        // Sahifa yuklanganda serverdan ma'lumotlarni olish
        window.onload = async () => {
            const res = await fetch('/api/state');
            const state = await res.json();
            document.getElementById('videoId').value = state.config.videoId || '';
            document.getElementById('teamAName').value = state.config.teamAName || '';
            document.getElementById('teamBName').value = state.config.teamBName || '';
            document.getElementById('keyA').value = state.config.keyA || '';
            document.getElementById('keyB').value = state.config.keyB || '';
        };

        async function sendControl(action) {
            const videoId = document.getElementById('videoId').value;
            await fetch('/api/control', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action, config: { videoId } })
            });
            alert("Buyruq yuborildi: " + action);
        }

        async function manualVote(team) {
            await fetch('/api/manual-vote', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ team })
            });
        }

        async function saveAll() {
            const config = {
                teamAName: document.getElementById('teamAName').value,
                teamBName: document.getElementById('teamBName').value,
                keyA: document.getElementById('keyA').value,
                keyB: document.getElementById('keyB').value,
                videoId: document.getElementById('videoId').value
            };

            // 1. Matnlarni saqlash
            await fetch('/api/control', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: 'update', config })
            });

            // 2. Logolarni yuklash
            const formData = new FormData();
            const lA = document.getElementById('logoA').files[0];
            const lB = document.getElementById('logoB').files[0];
            if (lA) formData.append('logoA', lA);
            if (lB) formData.append('logoB', lB);

            if (lA || lB) {
                await fetch('/api/upload', { method: 'POST', body: formData });
            }
            
            alert("Barcha sozlamalar serverga saqlandi (state.json)!");
            location.reload(); // Sahifani yangilab, ma'lumotlarni qayta o'qish
        }
    </script>
</body>
</html>
