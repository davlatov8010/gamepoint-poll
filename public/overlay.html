<!DOCTYPE html>
<html>
<head>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: transparent; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        .poll-bar {
            display: flex; align-items: center; background: rgba(0, 0, 0, 0.85);
            width: 900px; height: 90px; border-radius: 10px; border-bottom: 5px solid #e100e4;
            color: white; margin: 20px; padding: 0 20px;
        }
        .side { flex: 1; display: flex; align-items: center; gap: 15px; }
        .percent { font-size: 45px; }
        .logo { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #444; }
        .center-text { padding: 0 30px; font-size: 24px; color: #e100e4; }
        .key-hint { font-size: 16px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="poll-bar">
        <div class="side" style="color: #07d3ff;">
            <span id="pA" class="percent">0%</span>
            <img id="imgA" src="" class="logo">
            <div style="display: flex; flex-direction: column;">
                <span id="nA">TEAM A</span>
                <span id="kA" class="key-hint">!M</span>
            </div>
        </div>
        <div class="center-text">GOLOSOVANIE</div>
        <div class="side" style="justify-content: flex-end; color: #e100e4;">
            <div style="display: flex; flex-direction: column; align-items: flex-end;">
                <span id="nB">TEAM B</span>
                <span id="kB" class="key-hint">!F</span>
            </div>
            <img id="imgB" src="" class="logo">
            <span id="pB" class="percent">0%</span>
        </div>
    </div>

    <script>
        const socket = io();
        socket.on('update', (data) => {
            document.getElementById('pA').innerText = data.percentA + '%';
            document.getElementById('pB').innerText = data.percentB + '%';
            document.getElementById('imgA').src = data.config.logoA;
            document.getElementById('imgB').src = data.config.logoB;
            document.getElementById('nA').innerText = data.config.teamAName;
            document.getElementById('nB').innerText = data.config.teamBName;
            document.getElementById('kA').innerText = data.config.keyA;
            document.getElementById('kB').innerText = data.config.keyB;
        });
    </script>
</body>
</html>
